<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method="">
        <label for="Full Name">Full Name</label><br>
        <input type="text" id="Full Name" placeholder="Full Name"><br>

        <label for="email">Email</label><br>
        <input type="email" id="email" placeholder="example@mail.com"><br>

        <label>Gender</label>
        <label for="male">Male</label><br>
        <input type="radio" id="male" name="gender"><br>
        <label for="female">Female</label><br>
        <input type="radio" id="female" name="gender"><br>

        <label for="Age">Age</label>
        <input type="number" id="age" min="0" max="200" placeholder="1-200"><br>

        <label>Skills</label>
        
        <label for="web-dev">web-dev</label><br>
        <input type="checkbox" id="web-dev"><br>
        <label for="javaScript">JavaScript</label><br>
        <input type="checkbox" id="javaScript"><br>
        <label for="Python">Python</label><br>
        <input type="checkbox" id="python"><br>
        <label for="cyber-sec">Cyber Security</label><br>
        <input type="checkbox" id="cyber-sec"><br>
        <label for="data-science">Data-Science</label><br>
        <input type="checkbox" id="data-science"><br>
        <label for="Networking">Networking</label>
        <input type="checkbox" id="Networking"><br>

        <p>Marital Status</p>

        <label for="Single">Single</label><br>
        <input type="radio" id="Single" name="Marital Status"><br>
        <label for="Marriede">Married</label><br>
        <input type="radio" id="Married" name="Marital Status"><br>
        <label for="Divorced">Divorced </label><br>
        <input type="radio" id="Divorced" name="Marrital Status"><br>
        
        
        <label for="Date">Date</label><br>
        <input type="time" id="date"><br>

        <select>
            <option value="state">state</option>
            <option value="Anambra">Anambra</option>
            <option value="Enugu">Enugu</option>
            <option value="Akwa-Ibom">Akwa-Ibom</option>
            <option value="Enugu">Enugu</option>
            <option value="Bayelsa">Bayelsa</option>
            
        </select><br>
        
        <label for="password">Password</label><br>
        <input type="password" id="password" minlength="8" maxlenght="8" 
        pattern="[A-Z,a-z,0-9,$@!.]"><br>

        <label for="Phone Number">Phone number</label><br>
        <input type="tel" id="Phone number" id="number"><br>

        <label for="Website">Website</label><br>
        <input type="url" id="Website"><br>

        <input type="range" min="0" max="150">
        <input type="metre" min="0" max="100">
        
        
        <input type="button" value="submit"><br>
        <!--or-->
        <input type="submit">


        <!--old method-->
        <label>Email<br>
        <input type="text"> 
        </label><br>
    </form>
</body>
</html>
